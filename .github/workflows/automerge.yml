name: Automerge

# Enables GitHub native auto-merge on dependabot + release-please PRs.
# Native auto-merge waits for required checks + any required reviews,
# then squash-merges without further action. pull_request triggers fire
# from the target branch context, so secrets.CI_GITHUB_TOKEN is safe.
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  automerge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'release-please--')
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
