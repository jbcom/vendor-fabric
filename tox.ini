[tox]
env_list = lint,typecheck,py311,py312,py313,py314,plugin,providers,docs,build
requires =
    tox>=4.0
    tox-uv>=1.16

[testenv]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric[tests]
    -e packages/pytest-vendor-fabric
commands = pytest packages/vendor-fabric/tests {posargs}

[testenv:lint]
runner = uv-venv-runner
package = skip
deps = ruff>=0.8.0
commands = ruff check packages/vendor-fabric/src packages/vendor-fabric/tests packages/vendor-fabric/examples packages/pytest-vendor-fabric/src packages/pytest-vendor-fabric/tests

[testenv:typecheck]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric[typing]
    -e packages/pytest-vendor-fabric[typing]
commands = mypy packages/vendor-fabric/src packages/pytest-vendor-fabric/src

[testenv:plugin]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric
    -e packages/pytest-vendor-fabric[tests]
    pytest-asyncio>=1.3.0
    pytest-timeout>=2.4.0
commands = pytest packages/pytest-vendor-fabric/tests {posargs}

[testenv:providers]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric[tests,aws,google,github,slack,vault,mcp,langchain,secrets-sync]
    -e packages/pytest-vendor-fabric
commands = pytest packages/vendor-fabric/tests --cov=vendor_fabric --cov-report=term-missing --cov-fail-under=88 {posargs}

[testenv:e2e]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric[tests,meshy]
    -e packages/pytest-vendor-fabric
commands = pytest packages/vendor-fabric/tests/e2e {posargs}

[testenv:docs]
runner = uv-venv-runner
package = skip
deps =
    -e packages/vendor-fabric[docs]
    -e packages/pytest-vendor-fabric
commands_pre = python -c "import shutil; shutil.rmtree('docs/_build/html', ignore_errors=True)"
commands = sphinx-build -W -E -b html docs docs/_build/html

[testenv:build]
runner = uv-venv-runner
package = skip
deps = uv>=0.11.19
commands = uv build --all-packages --out-dir dist --clear
